<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>DPRO歯科｜医院管理</title><link rel="stylesheet" href="hybrid-owner.css"><script src="config.js"></script><script src="hybrid-config.js"></script><script src="hybrid-owner-common.js"></script></head><body>
<section id="loginView" class="owner-login"><div class="owner-logo">歯</div><h1>医院管理画面</h1><p>予約・急患・来院受付・電話受付を一つの画面で管理します。</p><div id="loginMessage" class="owner-message"></div><div class="owner-field"><label for="adminCode">管理コード</label><div class="owner-row"><input id="adminCode" class="owner-input" type="password" inputmode="numeric" autocomplete="current-password"><button id="clearCode" class="owner-btn light small" type="button">削除</button></div></div><button id="loginButton" class="owner-btn primary" type="button">管理画面を開く</button></section>
<main id="appView" class="owner-page hidden"><header class="owner-top"><div class="owner-brand"><div class="owner-logo">歯</div><div><strong id="clinicName">DPRO歯科</strong><small>予約・急患・来院受付 管理</small></div></div><div class="owner-actions"><input id="boardDate" class="owner-input" type="date" style="width:auto"><button id="refreshButton" class="owner-btn light keep" type="button">再読込</button><a class="owner-btn secondary" href="hybrid-owner-ipad.html" id="ipadLink">iPad受付</a><a class="owner-btn light" href="hybrid-owner-settings.html" id="settingsLink">医院設定</a><a class="owner-btn light" href="hybrid-system-check.html" id="systemCheckLink">system-check</a><button id="logoutButton" class="owner-btn light keep" type="button">管理コード削除</button></div></header>
<div id="mainMessage" class="owner-message"></div><div class="owner-toolbar"><nav class="owner-tabs"><button class="owner-tab active" data-tab="today">本日の予約</button><button class="owner-tab" data-tab="urgent">急患受付</button><button class="owner-tab" data-tab="queue">待ち列</button><button class="owner-tab" data-tab="phone">電話・窓口受付</button></nav></div>
<section id="summary" class="owner-summary"></section>
<section id="tab-today" class="owner-tab-panel"><div class="owner-panel"><h2>予約一覧</h2><div id="reservationList" class="owner-grid"></div></div></section>
<section id="tab-urgent" class="owner-tab-panel hidden"><div class="owner-panel"><h2>当日急患受付</h2><div id="urgentList" class="owner-grid"></div></div></section>
<section id="tab-queue" class="owner-tab-panel hidden"><div class="owner-panel"><h2>来院受付・待ち列</h2><div id="queueList" class="owner-grid"></div></div></section>
<section id="tab-phone" class="owner-tab-panel hidden"><div class="owner-grid"><div class="owner-panel"><h2>既存患者検索</h2><div class="owner-row"><input id="patientQuery" class="owner-input" placeholder="氏名・電話番号・診察券番号"><button id="patientSearchButton" class="owner-btn secondary" type="button">検索</button></div><div id="patientResults"></div></div><div class="owner-panel"><h2>選択中の患者</h2><div id="selectedPatient" class="owner-note">患者を検索して選択するか、初診情報を入力してください。</div></div></div>
<div class="owner-grid"><form id="phoneReservationForm" class="owner-panel"><h2>電話・窓口予約</h2><div class="owner-form-grid"><div class="owner-field"><label>受付方法</label><select id="bookingSource" class="owner-select"><option value="phone">電話</option><option value="counter">窓口</option></select></div><div class="owner-field"><label>診療メニュー</label><select id="bookingMenu" class="owner-select" required></select></div><div class="owner-field"><label>患者名</label><input id="bookingName" class="owner-input" required></div><div class="owner-field"><label>電話番号</label><input id="bookingPhone" class="owner-input" inputmode="tel"></div><div class="owner-field"><label>予約日</label><input id="bookingDate" class="owner-input" type="date" required></div><div class="owner-field"><label>担当者</label><select id="bookingStaff" class="owner-select"></select></div><div class="owner-field"><label>診療台</label><select id="bookingResource" class="owner-select"></select></div><div class="owner-field"><label>空き時間</label><select id="bookingTime" class="owner-select" required><option value="">先に空き枠を取得</option></select></div><div class="owner-field owner-full"><label>受付メモ</label><textarea id="bookingNote" class="owner-textarea"></textarea></div></div><div class="owner-row"><button id="loadSlotsButton" class="owner-btn light" type="button">空き枠を取得</button><button class="owner-btn primary" type="submit">予約を確定</button></div></form>
<form id="walkInForm" class="owner-panel"><h2>予約なし窓口受付</h2><div class="owner-form-grid"><div class="owner-field"><label>患者名</label><input id="walkInName" class="owner-input" required></div><div class="owner-field"><label>優先度</label><select id="walkInPriority" class="owner-select"><option value="0">通常</option><option value="300">早め</option><option value="700">優先</option></select></div><div class="owner-field owner-full"><label>受付メモ</label><textarea id="walkInNote" class="owner-textarea"></textarea></div></div><button class="owner-btn secondary" type="submit">窓口受付を登録</button></form></div></section>
<footer class="owner-auto">DPRO DENTAL-HYBRID-3 / 30分単位 / 電話番号正規化 / 重複防止</footer></main>
<script src="hybrid-owner.js"></script></body></html>
