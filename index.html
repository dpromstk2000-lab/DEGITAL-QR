<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO DENTAL CARD</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --medical-blue: #0055ff;
            --mint-cyan: #00e5ff;
            --bg-dark: #000c1a;
            --silver: #f1f5f9;
            --text-muted: #94a3b8;
            --card-gradient: linear-gradient(135deg, #0044cc 0%, #001133 100%);
            --form-bg: rgba(255, 255, 255, 0.07);
        }
        body { background-color: var(--bg-dark); margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; overflow: hidden; }
        .card-container { width: 90%; max-width: 350px; aspect-ratio: 1 / 1.5; background: var(--card-gradient); border-radius: 24px; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8); position: relative; padding: 20px 24px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255, 255, 255, 0.12); box-sizing: border-box; }
        
        .form-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 12, 26, 0.98); z-index: 10; display: none; flex-direction: column; justify-content: center; padding: 24px; box-sizing: border-box; }
        .form-input { background: var(--form-bg); border: 1px solid rgba(255,255,255,0.15); padding: 12px 14px; border-radius: 10px; color: #fff; font-size: 0.9rem; outline: none; margin-bottom: 14px; }
        .form-submit-btn { background: var(--medical-blue); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .form-cancel-btn { background: transparent; color: var(--text-muted); border: none; padding: 10px; margin-top: 10px; cursor: pointer; font-size: 0.9rem; }
        
        .family-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 5px; max-height: 40px; -webkit-overflow-scrolling: touch; width: 100%; box-sizing: border-box; }
        .family-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 5px 8px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
        .tab-btn.active { background: #fff; color: var(--bg-dark); font-weight: bold; border-color: #fff; }
        .add-family-btn { background: transparent; border: 1px dashed var(--mint-cyan); color: var(--mint-cyan); padding: 5px 8px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        
        .card-header { text-align: center; margin-top: 5px; }
        .card-title { font-size: 0.75rem; letter-spacing: 2px; color: var(--mint-cyan); margin: 0 0 6px 0; font-weight: 700; text-transform: uppercase; }
        .user-name { font-size: 1.5rem; margin: 0; font-weight: 700; }
        .qr-section { display: flex; justify-content: center; align-items: center; background: #fff; padding: 15px; border-radius: 16px; width: 130px; height: 130px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .appointment-section { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); margin: 10px 0; min-height: 50px; display: flex; flex-direction: column; justify-content: center; }
        .appointment-label { font-size: 0.65rem; color: var(--mint-cyan); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
        .appointment-date { font-family: 'Urbanist', sans-serif; font-size: 1.1rem; font-weight: 700; margin: 0; color: #fff; line-height: 1.2; }

        .card-footer { text-align: center; margin-bottom: 5px; display: flex; flex-direction: column; align-items: center; }
        .chart-no { font-family: 'Urbanist', sans-serif; font-size: 1.2rem; font-weight: 700; margin: 0; color: #fff; }
        .chart-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--medical-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="spinner"></div></div>
    
    <div class="card-container">
        <div class="form-overlay" id="formOverlay">
            <div id="formTitle" style="text-align:center; margin-bottom:24px; font-size:1.2rem; font-weight:bold; color:var(--mint-cyan);">デジタル診察券 登録</div>
            <input type="text" class="form-input" id="inputChartNo" placeholder="カルテ番号">
            <input type="text" class="form-input" id="inputName" placeholder="患者氏名">
            <input type="text" class="form-input" id="inputBirth" placeholder="生年月日 (例: 19740206)">
            <button class="form-submit-btn" id="btnSubmitForm">認証して登録</button>
            <button class="form-cancel-btn" id="btnCancelForm" style="display:none;">キャンセル</button>
        </div>

        <div class="family-tabs" id="familyTabs"></div>

        <div class="card-header">
            <p class="card-title">DIGITAL MEMBER'S CARD</p>
            <h1 id="userName" class="user-name">読み込み中...</h1>
        </div>

        <div class="qr-section">
            <div id="qrcode"></div>
        </div>

        <div class="appointment-section">
            <div class="appointment-label">Next Appointment</div>
            <div id="nextAppointment" class="appointment-date">確認中...</div>
        </div>

        <div class="card-footer">
            <div class="chart-label">Chart Number</div>
            <p id="chartNo" class="chart-no">--</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ropwvdnohadwxfbkcopx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_0Z9TNjw_B-eLInBFWNW5Ug_X4ymbN6v";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentLineUserId = "";
        let currentLineDisplayName = "";
        let patientList = []; 
        let qrCodeInstance = null;

        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2010131324-Cs3gdrah" });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const profile = await liff.getProfile();
                currentLineUserId = profile.userId;
                currentLineDisplayName = profile.displayName;

                try {
                    await supabaseClient.from('users').upsert({ 
                        line_user_id: currentLineUserId, 
                        display_name: currentLineDisplayName 
                    }, { onConflict: 'line_user_id' });
                } catch (dbErr) {
                    console.log("UsersUpsert制限スキップ:", dbErr);
                }

                await fetchFamilyData();
                // ※ ここにあった sendToSpreadsheet の処理は完全に削除しました。

            } catch (err) {
                console.error("初期化エラー:", err);
                alert("初期化中にエラーが発生しました。");
            } finally {
                document.getElementById('loading-screen').style.display = 'none';
            }
        }

        async function fetchFamilyData() {
            try {
                const { data: relations, error: relError } = await supabaseClient
                    .from('user_patient_relations')
                    .select('patient_id')
                    .eq('line_user_id', currentLineUserId);

                if (relError) throw relError;

                if (relations && relations.length > 0) {
                    const patientIds = relations.map(r => r.patient_id);

                    const { data: patients, error: patError } = await supabaseClient
                        .from('patients')
                        .select('id, patient_name, chart_no')
                        .in('id', patientIds);

                    if (patError) throw patError;

                    if (patients && patients.length > 0) {
                        patientList = patients;
                        document.getElementById('formOverlay').style.display = 'none';
                        renderTabs();
                        // 非同期関数になった displayCard を呼び出す
                        displayCard(patientList[0]);
                        return;
                    }
                }
                
                document.getElementById('formOverlay').style.display = 'flex';
                document.getElementById('btnCancelForm').style.display = 'none';

            } catch (err) {
                console.error("データ取得エラー:", err);
                document.getElementById('formOverlay').style.display = 'flex';
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('familyTabs');
            tabsContainer.innerHTML = ""; 

            patientList.forEach((patient, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = patient.patient_name.split(" ")[0] || patient.patient_name;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    displayCard(patient); // タブ切り替え時にもリアルタイムで予約を取得
                };
                tabsContainer.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = "add-family-btn";
            addBtn.innerText = "+ 家族追加";
            addBtn.onclick = () => {
                document.getElementById('formTitle').innerText = "ご家族の診察券 登録";
                document.getElementById('inputChartNo').value = "";
                document.getElementById('inputName').value = "";
                document.getElementById('inputBirth').value = "";
                document.getElementById('formOverlay').style.display = 'flex';
                document.getElementById('btnCancelForm').style.display = 'block'; 
            };
            tabsContainer.appendChild(addBtn);
        }

        // ▼【重要変更】async関数に変更し、Supabaseから予約を直接取得するようにしました
        async function displayCard(patient) {
            document.getElementById('userName').innerText = patient.patient_name + " 様";
            document.getElementById('chartNo').innerText = "No. " + patient.chart_no;
            
            // 一時的にロード中の文字を表示
            document.getElementById('nextAppointment').innerHTML = '<span style="font-size:0.8rem; color:#94a3b8;">確認中...</span>';

            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            qrCodeInstance = new QRCode(qrContainer, {
                text: patient.chart_no,
                width: 130,
                height: 130,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Supabaseから「今日以降」の「有効な」最新予約を1件取得する
            try {
                // 現在の時間を取得（過去の予約は表示しないため）
                const now = new Date().toISOString();
                
                const { data: apps, error } = await supabaseClient
                    .from('appointments')
                    .select('appointment_at, status')
                    .eq('patient_id', patient.id)
                    .in('status', ['scheduled', 'waiting', 'in_treatment']) // 完了・キャンセル以外
                    .gte('appointment_at', now)
                    .order('appointment_at', { ascending: true })
                    .limit(1);

                if (error) throw error;

                if (apps && apps.length > 0) {
                    const appointment = apps[0];
                    const d = new Date(appointment.appointment_at);
                    const formattedDate = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    
                    // ダッシュボードで受付（待合室）にしている場合は表示を変えるスマート機能
                    if (appointment.status === 'waiting') {
                        document.getElementById('nextAppointment').innerHTML = `<span style="font-size: 0.8rem; color: #facc15;">本日は受付済です</span><br>${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}〜`;
                    } else if (appointment.status === 'in_treatment') {
                        document.getElementById('nextAppointment').innerHTML = `<span style="font-size: 0.8rem; color: #4ade80;">診察室へご案内済です</span>`;
                    } else {
                        // 通常の予約中
                        document.getElementById('nextAppointment').innerText = formattedDate;
                    }
                } else {
                    document.getElementById('nextAppointment').innerText = "予定なし";
                }
            } catch (err) {
                console.error("予約取得エラー:", err);
                document.getElementById('nextAppointment').innerText = "取得エラー";
            }
        }

        document.getElementById('btnSubmitForm').onclick = async () => {
            const chartNo = document.getElementById('inputChartNo').value.trim();
            const name = document.getElementById('inputName').value.trim();
            const birth = document.getElementById('inputBirth').value.trim();

            if (!chartNo || !name || !birth) {
                alert("すべての項目を入力してください。");
                return;
            }

            try {
                const { data: patient, error: pError } = await supabaseClient
                    .from('patients')
                    .select('id, patient_name, chart_no')
                    .eq('chart_no', chartNo)
                    .eq('patient_name', name)
                    .eq('birth_date', birth)
                    .single();

                if (pError || !patient) {
                    alert("入力された情報に一致する患者データが見つかりません。");
                    return;
                }

                await supabaseClient.from('user_patient_relations').insert({
                    line_user_id: currentLineUserId,
                    patient_id: patient.id
                });

                alert("登録が完了しました！");
                
                document.getElementById('formOverlay').style.display = 'none';
                window.location.reload();
                
            } catch (err) {
                console.error("登録エラー:", err);
                alert("登録処理中にエラーが発生しました。既に登録されている可能性があります。");
            }
        };

        document.getElementById('btnCancelForm').onclick = () => {
            document.getElementById('formOverlay').style.display = 'none';
        };

        window.onload = initializeLiff;
    </script>
</body>
</html>
