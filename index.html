<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO DENTAL CARD</title>
    <!-- LINE SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- QRコード生成ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- フォント -->
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --medical-blue: #0055ff;
            --mint-cyan: #00e5ff;
            --bg-dark: #000c1a;
            --silver: #f1f5f9;
            --text-muted: #94a3b8;
            --card-gradient: linear-gradient(135deg, #0044cc 0%, #001133 100%);
        }

        body {
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .card-container {
            width: 90%;
            max-width: 350px;
            aspect-ratio: 1 / 1.5; 
            background: var(--card-gradient);
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            position: relative;
            padding: 18px 22px; 
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
        }

        .card-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 16px 16px;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 2;
            margin-bottom: 10px;
        }

        .logo-section { display: flex; align-items: center; gap: 8px; }
        .medical-cross {
            width: 12px; height: 12px;
            background: var(--mint-cyan);
            position: relative;
        }
        .medical-cross::before { content: ""; position: absolute; top: 4px; left: -4px; width: 20px; height: 4px; background: var(--mint-cyan); }
        .medical-cross::after { content: ""; position: absolute; left: 4px; top: -4px; width: 4px; height: 20px; background: var(--mint-cyan); }

        .brand-logo {
            font-family: 'Urbanist', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            margin-left: 8px;
        }

        .badge-clinic {
            border: 1px solid var(--mint-cyan);
            padding: 3px 8px;
            border-radius: 50px;
            font-size: 0.55rem;
            color: var(--mint-cyan);
        }

        /* 家族切り替えタブのスタイル */
        .family-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            z-index: 2;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 4px;
        }
        .family-selector::-webkit-scrollbar { display: none; }
        
        .family-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.65rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .family-tab.active {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--mint-cyan);
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
            font-weight: 700;
        }

        .user-section { z-index: 2; margin-bottom: 8px; }
        .label-small { font-size: 0.55rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1px; }
        .user-name { font-size: 1.5rem; font-weight: 700; margin: 0; color: #fff; }

        .appointment-box {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 10px 14px;
            z-index: 2;
            margin-bottom: 12px;
        }

        .appointment-title { font-size: 0.6rem; color: var(--mint-cyan); font-weight: 700; margin: 0 0 4px 0; }
        .appointment-date { font-size: 1.15rem; font-weight: 700; color: #fff; margin: 0; }

        .qrcode-area {
            background: #fff;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            width: 115px; 
            height: 115px;
            margin: 0 auto;
        }
        .qrcode-area img { width: 115px !important; height: 115px !important; }

        .card-footer {
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 2;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: auto;
        }

        .footer-row { display: flex; justify-content: space-between; align-items: center; }
        .meta-item { display: flex; flex-direction: column; }
        .meta-label { font-size: 0.5rem; color: var(--text-muted); }
        .meta-value-id { font-family: 'Urbanist', sans-serif; font-size: 0.65rem; font-weight: 700; color: var(--mint-cyan); word-break: break-all; }
        .meta-value { font-family: 'Urbanist', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--silver); }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        .spinner { width: 35px; height: 35px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--medical-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="spinner"></div></div>
    
    <div class="card-container">
        <div class="card-header">
            <div class="logo-section">
                <div class="medical-cross"></div>
                <div class="brand-logo">DPRO歯科</div>
            </div>
            <div class="badge-clinic">DIGITAL CARD</div>
        </div>

        <!-- 家族切り替えタブ設置エリア -->
        <div class="family-selector" id="familySelector"></div>

        <div class="user-section">
            <p class="label-small">PATIENT NAME</p>
            <h1 class="user-name" id="userName">データ取得中...</h1>
        </div>
        
        <div class="appointment-box">
            <p class="appointment-title">NEXT APPOINTMENT（次回予約日時）</p>
            <p class="appointment-date" id="appointmentDate">---</p>
        </div>
        
        <div class="qrcode-area" id="qrcode"></div>
        <p style="text-align:center; font-size: 0.55rem; color: rgba(255,255,255,0.3); margin-top: 6px; margin-bottom: 8px; z-index: 2;">受付のリーダーにかざしてください</p>
        
        <div class="card-footer">
            <div class="meta-item">
                <span class="meta-label">LINE USER ID</span>
                <span class="meta-value-id" id="displayId">---</span>
            </div>
            <div class="footer-row">
                <div class="meta-item"><span class="meta-label">CHART NO</span><span class="meta-value" id="chartNo">---</span></div>
                <div class="meta-item" style="text-align: right;"><span class="meta-label">CLINIC TEL</span><span class="meta-value">092-XXX-XXXX</span></div>
            </div>
        </div>
    </div>

    <script>
        // --- ⚙️ Supabase 設定項目 ---
        const SUPABASE_URL = "https://ropwvdnohadwxfbkcopx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_0Z9TNjw_B-eLInBFWNW5Ug_X4ymbN6v";
        
        // ライブラリ初期化の安全な呼び出し
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let familyData = [];
        let qrcodeInstance = null;

        // QRコードを再生成する関数
        function generateQRCode(text) {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; 
            qrcodeInstance = new QRCode(qrContainer, {
                text: text,
                width: 115,
                height: 115,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // 画面の表示データを書き換える関数
        function updateCardDisplay(patient) {
            document.getElementById('userName').innerText = patient.patient_name + " 様";
            document.getElementById('appointmentDate').innerText = patient.appointment_date || "次回の予約はありません";
            document.getElementById('chartNo').innerText = patient.chart_no;
            generateQRCode(patient.id);
        }

        // タブのUIを生成・切り替え制御する関数
        function renderTabs() {
            const selector = document.getElementById('familySelector');
            selector.innerHTML = '';

            familyData.forEach((member) => {
                const tab = document.createElement('div');
                tab.className = `family-tab ${member.is_primary ? 'active' : ''}`;
                tab.innerText = member.patients.patient_name.replace('DPRO ', '');
                
                tab.onclick = () => {
                    document.querySelectorAll('.family-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    updateCardDisplay(member.patients);
                };
                selector.appendChild(tab);
            });
        }

        // SupabaseからLINE IDに紐づく家族データを取得する関数
        async function fetchFamilyData(lineUserId) {
            try {
                const { data, error } = await supabaseClient
                    .from('user_patient_relations')
                    .select('is_primary, patients(id, patient_name, chart_no, appointment_date)')
                    .eq('line_user_id', lineUserId);

                if (error) throw error;

                if (data && data.length > 0) {
                    familyData = data.sort((a, b) => (b.is_primary ? 1 : 0) - (a.is_primary ? 1 : 0));
                    const primaryMember = familyData.find(m => m.is_primary) || familyData[0];
                    renderTabs();
                    updateCardDisplay(primaryMember.patients);
                } else {
                    // データベース側に本物のLINE IDの登録がない場合のデモ用ダミー表示
                    renderDemoFallback();
                }
            } catch (err) {
                console.error("データ取得エラー:", err);
                renderDemoFallback(); // エラーが起きてもフリーズさせずデモ表示に逃がす
            }
        }

        // 本物のLINE IDが未登録のときに、仮の家族データを表示する安全装置
        function renderDemoFallback() {
            familyData = [
                { is_primary: true, patients: { id: "a0eebc99-9c0b-4ef8-bb6d-6bb9bd380a11", patient_name: "DPRO お母さん", chart_no: "No.1045", appointment_date: "2026年6月10日 10:00" }},
                { is_primary: false, patients: { id: "b0eebc99-9c0b-4ef8-bb6d-6bb9bd380a22", patient_name: "DPRO たろう君", chart_no: "No.1046", appointment_date: "2026年6月18日 15:30" }}
            ];
            renderTabs();
            updateCardDisplay(familyData[0].patients);
        }

        // LIFF初期化
        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2010131324-Cs3gdrah" }); 
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('displayId').innerText = profile.userId;

                    // 本物のLINE IDを使ってSupabaseを検索
                    await fetchFamilyData(profile.userId);
                    
                    // ローディング画面を確実に消去
                    hideLoading();
                }
            } catch (error) { 
                console.error("LINE初期化エラー:", error); 
                renderDemoFallback();
                hideLoading(); 
            }
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none'; 
        }
        
        initializeLiff();
    </script>
</body>
</html>
