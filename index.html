<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO DENTAL CARD</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 以前のCSS設定をそのまま維持してください */
        body { background-color: #000c1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000c1a; display: flex; justify-content: center; align-items: center; z-index: 999; }
        #formOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loading-screen">読み込み中...</div>

    <div id="card">
        <h2 id="userName">-- 様</h2>
        <p>診察券番号: <span id="chartNo">--</span></p>
        <div id="qrcode"></div>
    </div>

    <div id="formOverlay">
        <div>
            <input type="text" id="inputChartNo" placeholder="診察券番号">
            <input type="text" id="inputName" placeholder="氏名">
            <input type="date" id="inputBirth">
            <button id="btnSubmitForm">登録する</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ropwvdnohadwxfbkcopx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_0Z9TNjw_B-eLInBFWNW5Ug_X4ymbN6v";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentLineUserId = "";

        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2010131324-Cs3gdrah" }); 
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const profile = await liff.getProfile();
                currentLineUserId = profile.userId;

                // 1. ユーザー登録（upsert）
                await supabaseClient.from('users').upsert({ 
                    line_user_id: currentLineUserId, 
                    display_name: profile.displayName 
                }, { onConflict: 'line_user_id' });

                // 2. データの取得
                await fetchFamilyData(currentLineUserId);
            } catch (err) { console.error(err); }
            document.getElementById('loading-screen').style.display = 'none';
        }

        async function fetchFamilyData(lineUserId) {
            const { data, error } = await supabaseClient
                .from('user_patient_relations')
                .select('is_primary, patients(id, patient_name, chart_no, appointment_date)')
                .eq('line_user_id', lineUserId);

            if (data && data.length > 0) {
                const p = data[0].patients;
                document.getElementById('userName').innerText = p.patient_name + " 様";
                document.getElementById('chartNo').innerText = p.chart_no;
                new QRCode(document.getElementById("qrcode"), p.id);
            } else {
                document.getElementById('formOverlay').style.display = 'flex';
            }
        }

        document.getElementById('btnSubmitForm').onclick = async () => {
            const chartNo = document.getElementById('inputChartNo').value;
            const patientName = document.getElementById('inputName').value;
            
            const { data: pData } = await supabaseClient.from('patients').select('id').eq('chart_no', chartNo).eq('patient_name', patientName).single();
            
            if (pData) {
                await supabaseClient.from('user_patient_relations').insert([{ line_user_id: currentLineUserId, patient_id: pData.id, is_primary: true }]);
                location.reload();
            } else {
                alert("該当者が見つかりません");
            }
        };

        initializeLiff();
    </script>
</body>
</html>
