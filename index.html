<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO DENTAL CARD</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --medical-blue: #0055ff;
            --mint-cyan: #00e5ff;
            --bg-dark: #000c1a;
            --silver: #f1f5f9;
            --text-muted: #94a3b8;
            --card-gradient: linear-gradient(135deg, #0044cc 0%, #001133 100%);
            --form-bg: rgba(255, 255, 255, 0.07);
        }
        body { background-color: var(--bg-dark); margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; overflow: hidden; }
        .card-container { width: 90%; max-width: 350px; aspect-ratio: 1 / 1.5; background: var(--card-gradient); border-radius: 24px; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8); position: relative; padding: 18px 22px; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.12); overflow: hidden; }
        .form-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 12, 26, 0.98); z-index: 10; display: none; flex-direction: column; justify-content: center; padding: 24px; box-sizing: border-box; }
        .form-input { background: var(--form-bg); border: 1px solid rgba(255,255,255,0.15); padding: 10px 14px; border-radius: 10px; color: #fff; font-size: 0.9rem; outline: none; margin-bottom: 12px; }
        .form-submit-btn { background: var(--medical-blue); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .spinner { width: 35px; height: 35px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--medical-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="spinner"></div></div>
    
    <div class="card-container">
        <div class="form-overlay" id="formOverlay">
            <div id="formTitle" style="text-align:center; margin-bottom:20px; font-weight:bold;">デジタル診察券 登録</div>
            <input type="text" class="form-input" id="inputChartNo" placeholder="カルテ番号">
            <input type="text" class="form-input" id="inputName" placeholder="患者氏名">
            <input type="text" class="form-input" id="inputBirth" placeholder="生年月日 (例: 19740206)">
            <button class="form-submit-btn" id="btnSubmitForm">認証して登録</button>
        </div>

        <h1 id="userName" style="text-align:center; margin-top:20px;">読み込み中...</h1>
        <div id="qrcode" style="margin: 20px auto; display: flex; justify-content: center;"></div>
        <p id="chartNo" style="text-align:center; font-size: 1.2rem; font-weight: bold;"></p>
    </div>

    <script>
        const SUPABASE_URL = "https://ropwvdnohadwxfbkcopx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_0Z9TNjw_B-eLInBFWNW5Ug_X4ymbN6v";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2010131324-Cs3gdrah" });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const profile = await liff.getProfile();
                const userId = profile.userId;

                // 1. ユーザーが存在しなければ確実に作成（upsert）
                await supabase.from('users').upsert({ 
                    line_user_id: userId, 
                    display_name: profile.displayName 
                }, { onConflict: 'line_user_id' });

                // 2. 紐付けデータがあるか確認
                const { data, error } = await supabase
                    .from('user_patient_relations')
                    .select('patients(patient_name, chart_no, id)')
                    .eq('line_user_id', userId);

                if (data && data.length > 0) {
                    const p = data[0].patients;
                    document.getElementById('userName').innerText = p.patient_name + " 様";
                    document.getElementById('chartNo').innerText = "No." + p.chart_no;
                    
                    // QRコードの生成を中央に綺麗に配置
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), {
                        text: p.id,
                        width: 150,
                        height: 150
                    });
                } else {
                    document.getElementById('formOverlay').style.display = 'flex';
                }
            } catch (err) {
                console.error(err);
                alert("初期化エラーが発生しました。");
            } finally {
                document.getElementById('loading-screen').style.display = 'none';
            }
        }

        document.getElementById('btnSubmitForm').onclick = async () => {
            const chartNo = document.getElementById('inputChartNo').value.trim();
            const name = document.getElementById('inputName').value.trim();
            const birth = document.getElementById('inputBirth').value.trim();

            if (!chartNo || !name || !birth) {
                alert("すべての項目を入力してください。");
                return;
            }

            document.getElementById('loading-screen').style.display = 'flex';
            
            // 患者検索
            const { data: pData, error: pError } = await supabase.from('patients')
                .select('id').eq('chart_no', chartNo).eq('patient_name', name).eq('birth_date', birth);

            if (!pData || pData.length === 0) {
                alert("該当するカルテが見つかりません。入力内容を確認してください。");
                document.getElementById('loading-screen').style.display = 'none';
                return;
            }

            // 紐付け登録
            const profile = await liff.getProfile();
            const { error: rError } = await supabase.from('user_patient_relations').insert({
                line_user_id: profile.userId,
                patient_id: pData[0].id,
                is_primary: true
            });
            
            if (rError) {
                console.error(rError);
                alert("登録に失敗しました。データベースの制約を確認してください。");
                document.getElementById('loading-screen').style.display = 'none';
            } else {
                location.reload();
            }
        };

        initializeLiff();
    </script>
</body>
</html>
