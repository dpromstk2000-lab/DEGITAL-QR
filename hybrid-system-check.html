<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>DPRO歯科｜営業前system-check</title>
  <link rel="stylesheet" href="hybrid-owner.css">
  <script src="config.js"></script>
  <script src="hybrid-config.js"></script>
  <script src="hybrid-owner-common.js"></script>
</head>
<body>
<section id="loginView" class="owner-login"><div class="owner-logo">歯</div><h1>営業前system-check</h1><p>医院設定・マスタ・公開API・管理保護・検査データ残存を一括確認します。</p><div id="loginMessage" class="owner-message"></div><div class="owner-field"><label>管理コード</label><div class="owner-row"><input id="adminCode" class="owner-input" type="password" inputmode="numeric"><button id="clearCode" class="owner-btn light small" type="button">削除</button></div></div><button id="loginButton" class="owner-btn primary" type="button">system-checkを開く</button></section>
<main id="appView" class="owner-page hidden">
  <header class="owner-top"><div class="owner-brand"><div class="owner-logo">歯</div><div><strong id="clinicName">DPRO歯科</strong><small>営業前 最終system-check</small></div></div><div class="owner-actions"><button id="runButton" class="owner-btn primary keep" type="button">一括チェック実行</button><a id="settingsLink" class="owner-btn secondary" href="hybrid-owner-settings.html">医院設定</a><a id="ownerLink" class="owner-btn light" href="hybrid-owner.html">管理画面</a><button id="logoutButton" class="owner-btn light keep" type="button">管理コード削除</button></div></header>
  <div id="mainMessage" class="owner-message"></div>
  <section class="owner-panel"><div class="owner-check-head"><div><h2>検査結果</h2><p id="checkMeta" class="owner-meta">未実行</p></div><div id="checkResult" class="owner-check-result waiting">未実行</div></div><div id="checkSummary" class="owner-summary"></div></section>
  <section class="owner-panel"><h2>詳細</h2><div id="checkList" class="owner-check-list"><div class="owner-empty">「一括チェック実行」を押してください。</div></div></section>
  <details class="owner-panel"><summary>JSON結果</summary><pre id="rawOutput" class="owner-json">未実行</pre></details>
  <footer class="owner-auto">予約・急患などの実データは作成せず、営業開始前に安全確認します。</footer>
</main>
<script src="hybrid-system-check.js"></script>
</body>
</html>
